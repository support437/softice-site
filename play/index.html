<body>
<div class="container">
    <h1>Opening Google Play…</h1>
    <p>
        Bedtime Story Books – Cozy Tales includes 2 free books, calming bedtime stories for kids, and no subscription.
    </p>
    <a
        href="https://play.google.com/store/apps/details?id=com.softiceinnovationslabs.bedtimestorybooks&utm_source=softice_site&utm_medium=organic&utm_campaign=play_page_redirect&utm_content=fallback_button"
        class="btn"
        id="fallbackPlayButton"
        target="_blank"
        rel="noopener noreferrer"
    >
        Get it on Google Play
    </a>
    <p class="small">If you are not redirected automatically, tap the button above.</p>
</div>

<script>
(function () {
    const PLAY_URL = "https://play.google.com/store/apps/details?id=com.softiceinnovationslabs.bedtimestorybooks&utm_source=softice_site&utm_medium=organic&utm_campaign=play_page_redirect&utm_content=auto_redirect";

    function getDeviceType() {
        const ua = navigator.userAgent || "";
        if (/tablet|ipad|playbook|silk/i.test(ua)) return "tablet";
        if (/Mobile|Android|iPhone|iPod/i.test(ua)) return "mobile";
        return "desktop";
    }

    function getSessionId() {
        let sessionId = sessionStorage.getItem("softice_session_id");
        if (!sessionId) {
            sessionId = "sess_" + Date.now() + "_" + Math.random().toString(36).slice(2, 10);
            sessionStorage.setItem("softice_session_id", sessionId);
        }
        return sessionId;
    }

    function commonParams() {
        return {
            page_location: window.location.href,
            page_path: window.location.pathname,
            page_title: document.title,
            referrer: document.referrer || "direct",
            device_type: getDeviceType(),
            session_id: getSessionId()
        };
    }

    function trackEvent(eventName, params) {
        if (typeof gtag === "function") {
            gtag("event", eventName, params);
        }
        console.log("Tracked event:", eventName, params);
    }

    window.addEventListener("load", function () {
        trackEvent("play_page_view", {
            ...commonParams(),
            page_name: "play_redirect_page"
        });

        trackEvent("google_play_redirect_attempt", {
            ...commonParams(),
            page_name: "play_redirect_page",
            redirect_type: "auto_redirect",
            destination_url: PLAY_URL
        });

        setTimeout(function () {
            window.location.href = PLAY_URL;
        }, 700);
    });

    document.getElementById("fallbackPlayButton").addEventListener("click", function () {
        trackEvent("google_play_click", {
            ...commonParams(),
            cta_location: "play_page_fallback_button",
            cta_content: "fallback_button",
            link_url: this.href,
            link_text: this.textContent.trim()
        });
    });
})();
</script>
